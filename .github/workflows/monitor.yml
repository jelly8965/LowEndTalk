name: LowEndTalk Monitor

on:
  schedule:
    # 国际标准时间 (UTC)，每 3 小时整点运行一次
    - cron: '0 */3 * * *'
  workflow_dispatch: # 允许在 GitHub 网页端手动点击运行，方便测试

permissions:
  contents: write # 允许工作流提交代码，用于更新状态文件

jobs:
  monitor:
    runs-on: ubuntu-22.04 # 采用默认 Linux 环境，计费 1 倍率

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装 Playwright 所需的浏览器内核及系统依赖
          playwright install chromium --with-deps

      - name: Run Monitor Script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          LET_USERNAME: ${{ secrets.LET_USERNAME }} 
          LET_PASSWORD: ${{ secrets.LET_PASSWORD }} 
        run: python monitor.py

      - name: Commit and push state if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_discussion.txt
          # 检查文件是否有变动，如果有则提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update last discussion state" && git push)
